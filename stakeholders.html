<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>STARBOOKS Stakeholders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: linear-gradient(135deg, #e3f2fd, #fff3e0);
      }

      /* Banner */
      .banner {
        background: linear-gradient(90deg, #ff9800, #ffb74d);
        color: white;
        overflow: hidden;
        white-space: nowrap;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .banner p {
        display: inline-block;
        padding: 15px;
        animation: scrollText 15s linear infinite;
        font-size: 18px;
        font-weight: bold;
      }

      @keyframes scrollText {
        0% {
          transform: translateX(100%);
        }
        100% {
          transform: translateX(-100%);
        }
      }

      /* Title */
      .title {
        text-align: center;
        margin: 25px 10px 5px;
      }

      .title h1 {
        margin: 0;
        font-size: 28px;
        color: #0d47a1;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
      }

      .title p {
        margin: 5px 0 0;
        font-size: 16px;
        color: #555;
      }

      /* Content */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      video {
        width: 80%;
        max-height: 65vh;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        background: #000;
      }

      /* Controls */
      .controls {
        margin-top: 10px;
      }

      .controls button {
        padding: 8px 14px;
        border: none;
        background: #2196f3;
        color: white;
        cursor: pointer;
        border-radius: 6px;
        font-weight: bold;
      }

      /* Playlist */
      .playlist {
        margin-top: 15px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .playlist button {
        padding: 8px 12px;
        border: none;
        background: #ff9800;
        color: white;
        cursor: pointer;
        border-radius: 6px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <!-- Banner -->
    <div class="banner">
      <p>
        📢 Announcement: Learn more about STARBOOKS stakeholders, partners, and
        beneficiaries.
      </p>
    </div>

    <!-- Title -->
    <div class="title">
      <h1>STARBOOKS Stakeholders</h1>
      <p>Empowering communities through partnerships and knowledge sharing</p>
    </div>

    <!-- Content -->
    <div class="content">
      <video id="videoPlayer" autoplay muted loop controls>
        <source
          src="https://www.w3schools.com/html/mov_bbb.mp4"
          type="video/mp4"
        />
      </video>

      <div class="controls">
        <button onclick="goFullscreen()">⛶ Fullscreen</button>
      </div>

      <div class="playlist">
        <button
          onclick="changeVideo('https://www.w3schools.com/html/mov_bbb.mp4')"
        >
          Overview
        </button>
        <button
          onclick="
            changeVideo(
              'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4',
            )
          "
        >
          Partners
        </button>
        <button
          onclick="changeVideo('https://www.w3schools.com/html/movie.mp4')"
        >
          Beneficiaries
        </button>
      </div>
    </div>

    <script>
      const video = document.getElementById("videoPlayer");

      function changeVideo(src) {
        video.src = src;
        video.play();
      }

      function goFullscreen() {
        if (video.requestFullscreen) {
          video.requestFullscreen();
        } else if (video.webkitRequestFullscreen) {
          video.webkitRequestFullscreen();
        } else if (video.msRequestFullscreen) {
          video.msRequestFullscreen();
        }
      }
    </script>
  </body>
</html>
