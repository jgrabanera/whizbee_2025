<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Deployments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      :root {
        color-scheme: light;
        --bg: #f4f8ff;
        --panel: rgba(255, 255, 255, 0.92);
        --text: #1f2b3a;
        --muted: #5f6e7a;
        --border: rgba(31, 43, 58, 0.08);
        --shadow: 0 28px 80px rgba(31, 43, 58, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, sans-serif;
        background: radial-gradient(
          circle at top left,
          #e8f2ff 0%,
          #fdfcff 44%,
          #f8f9fb 100%
        );
        color: var(--text);
      }

      .page-shell {
        max-width: 1080px;
        margin: 0 auto;
        padding: 28px 20px 36px;
      }

      .hero {
        position: relative;
        background: linear-gradient(135deg, #3c82f6, #66b5ff);
        border-radius: 28px;
        padding: 42px 38px;
        color: #fff;
        overflow: hidden;
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -40px;
        top: -24px;
        width: 220px;
        height: 220px;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.35),
          transparent 58%
        );
        filter: blur(12px);
      }

      .hero .eyebrow {
        display: inline-flex;
        padding: 0.45rem 0.9rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        font-size: 0.82rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 1rem;
        position: relative;
        z-index: 1;
      }

      .hero h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.2rem, 3.6vw, 3.6rem);
        line-height: 1.02;
        position: relative;
        z-index: 1;
      }

      .hero p {
        margin: 0;
        max-width: 720px;
        font-size: 1.05rem;
        line-height: 1.8;
        opacity: 0.95;
        position: relative;
        z-index: 1;
      }

      .media-grid {
        margin-top: 26px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }

      .media-card {
        position: relative;
        border-radius: 22px;
        overflow: hidden;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .media-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 38px 95px rgba(31, 43, 58, 0.16);
      }

      .media-preview {
        width: 100%;
        aspect-ratio: 16 / 10;
        background: #0b1220;
      }

      .media-preview img,
      .media-preview video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .media-caption {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 14px 16px 12px;
        color: rgba(255, 255, 255, 0.96);
        font-weight: 700;
        letter-spacing: 0.01em;
        background: linear-gradient(
          to top,
          rgba(15, 23, 42, 0.78) 0%,
          rgba(15, 23, 42, 0.34) 52%,
          transparent 100%
        );
        text-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      }

      .media-badge {
        position: absolute;
        top: 14px;
        left: 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(31, 43, 58, 0.12);
        color: #0f172a;
        font-weight: 700;
      }

      /* Modal Viewer */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.8);
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 24px 16px;
      }

      .modal-panel {
        width: min(1000px, 100%);
        max-height: 100%;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.26);
        box-shadow: 0 38px 120px rgba(0, 0, 0, 0.4);
        border-radius: 24px;
        overflow: hidden;
        position: relative;
        display: grid;
      }

      .modal-content {
        width: 100%;
        height: 100%;
        max-height: 78vh;
        background: #0b1220;
        display: grid;
        place-items: center;
      }

      .modal-content img,
      .modal-content video {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .close {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 1px solid rgba(31, 43, 58, 0.16);
        background: rgba(255, 255, 255, 0.9);
        cursor: pointer;
        display: grid;
        place-items: center;
        color: #0f172a;
      }

      .close:hover {
        background: #fff;
      }

      .bottom-row {
        margin-top: 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 14px;
      }

      .bottom-row p {
        margin: 0;
        color: var(--muted);
        max-width: 680px;
      }

      .bottom-row a {
        color: #1d4ed8;
        text-decoration: none;
        font-weight: 700;
      }

      .bottom-row a:hover {
        color: #153e8a;
      }

      @media (max-width: 760px) {
        .page-shell {
          padding: 22px 16px 28px;
        }

        .hero {
          padding: 30px 24px;
        }

        .media-grid {
          gap: 14px;
        }
      }
    </style>
  </head>

  <body>
    <div class="page-shell">
      <section class="hero">
        <div class="eyebrow">STARBOOKS Field Updates</div>
        <h1>Deployments</h1>
        <p>Browse photos and videos from STARBOOKS deployments and trainings.</p>
      </section>

      <main class="media-grid" aria-label="Deployment media gallery">
        <div
          class="media-card"
          role="button"
          tabindex="0"
          onclick="openModal('img', 'https://picsum.photos/1200/800?1')"
          onkeydown="if(event.key==='Enter'||event.key===' '){openModal('img','https://picsum.photos/1200/800?1')}"
          aria-label="Open image: Deployment activity"
        >
          <div class="media-preview">
            <img src="https://picsum.photos/600/375?1" alt="Deployment activity" />
          </div>
          <div class="media-badge"><i class="fa-regular fa-image"></i> Photo</div>
          <div class="media-caption">Deployment Activity</div>
        </div>

        <div
          class="media-card"
          role="button"
          tabindex="0"
          onclick="openModal('video', 'https://www.w3schools.com/html/mov_bbb.mp4')"
          onkeydown="if(event.key==='Enter'||event.key===' '){openModal('video','https://www.w3schools.com/html/mov_bbb.mp4')}"
          aria-label="Open video: Training video"
        >
          <div class="media-preview">
            <video muted loop playsinline preload="metadata">
              <source src="https://www.w3schools.com/html/mov_bbb.mp4" />
            </video>
          </div>
          <div class="media-badge"><i class="fa-solid fa-video"></i> Video</div>
          <div class="media-caption">Training Video</div>
        </div>

        <div
          class="media-card"
          role="button"
          tabindex="0"
          onclick="openModal('img', 'https://picsum.photos/1200/800?2')"
          onkeydown="if(event.key==='Enter'||event.key===' '){openModal('img','https://picsum.photos/1200/800?2')}"
          aria-label="Open image: Installation"
        >
          <div class="media-preview">
            <img src="https://picsum.photos/600/375?2" alt="Installation" />
          </div>
          <div class="media-badge"><i class="fa-regular fa-image"></i> Photo</div>
          <div class="media-caption">Installation</div>
        </div>

        <div
          class="media-card"
          role="button"
          tabindex="0"
          onclick="openModal('video', 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4')"
          onkeydown="if(event.key==='Enter'||event.key===' '){openModal('video','https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4')}"
          aria-label="Open video: Community engagement"
        >
          <div class="media-preview">
            <video muted loop playsinline preload="metadata">
              <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" />
            </video>
          </div>
          <div class="media-badge"><i class="fa-solid fa-video"></i> Video</div>
          <div class="media-caption">Community Engagement</div>
        </div>
      </main>

      <div class="bottom-row">
        <p>More updates are posted on STARBOOKS official channels.</p>
        <a href="index.html">Back to overview</a>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Media viewer">
      <div class="modal-panel">
        <button class="close" type="button" onclick="closeModal()" aria-label="Close viewer">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="modal-content" id="modalContent"></div>
      </div>
    </div>

    <script>
      function openModal(type, src) {
        const modal = document.getElementById("modal");
        const content = document.getElementById("modalContent");

        if (type === "img") {
          content.innerHTML = `<img src="${src}" alt="Deployment media">`;
        } else {
          content.innerHTML = `<video src="${src}" controls autoplay playsinline></video>`;
        }

        modal.style.display = "flex";
        modal.addEventListener("click", onBackdropClick);
        document.addEventListener("keydown", onKeyDown);
      }

      function onBackdropClick(event) {
        if (event.target && event.target.id === "modal") {
          closeModal();
        }
      }

      function onKeyDown(event) {
        if (event.key === "Escape") {
          closeModal();
        }
      }

      function closeModal() {
        const modal = document.getElementById("modal");
        const content = document.getElementById("modalContent");

        modal.style.display = "none";
        content.innerHTML = "";
        modal.removeEventListener("click", onBackdropClick);
        document.removeEventListener("keydown", onKeyDown);
      }
    </script>
  </body>
</html>
