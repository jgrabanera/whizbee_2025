<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STARBOOKS Collaborators</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <meta http-equiv="refresh" content="2; url=https://starbooks.ph/partners" />

    <style>
      :root {
        color-scheme: light;
        --bg: #f4f8ff;
        --panel: rgba(255, 255, 255, 0.92);
        --text: #1f2b3a;
        --muted: #5f6e7a;
        --border: rgba(31, 43, 58, 0.08);
        --shadow: 0 28px 80px rgba(31, 43, 58, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, sans-serif;
        background: radial-gradient(
          circle at top left,
          #e8f2ff 0%,
          #fdfcff 44%,
          #f8f9fb 100%
        );
        color: var(--text);
      }

      .page-shell {
        max-width: 1080px;
        margin: 0 auto;
        padding: 28px 20px 36px;
      }

      .hero {
        position: relative;
        background: linear-gradient(135deg, #3c82f6, #66b5ff);
        border-radius: 28px;
        padding: 42px 38px;
        color: #fff;
        overflow: hidden;
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -40px;
        top: -24px;
        width: 220px;
        height: 220px;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.35),
          transparent 58%
        );
        filter: blur(12px);
      }

      .hero .eyebrow {
        display: inline-flex;
        padding: 0.45rem 0.9rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        font-size: 0.82rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 1rem;
        position: relative;
        z-index: 1;
      }

      .hero h1 {
        margin: 0 0 0.9rem;
        font-size: clamp(2rem, 3.2vw, 3.2rem);
        line-height: 1.06;
        position: relative;
        z-index: 1;
      }

      .hero p {
        margin: 0;
        max-width: 680px;
        font-size: 1.05rem;
        line-height: 1.8;
        opacity: 0.95;
        position: relative;
        z-index: 1;
      }

      .panel {
        margin-top: 22px;
        padding: 20px 22px;
        border-radius: 22px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }

      .panel .hint {
        color: var(--muted);
        line-height: 1.6;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(29, 78, 216, 0.18);
        background: rgba(29, 78, 216, 0.1);
        color: #1d4ed8;
        font-weight: 700;
        text-decoration: none;
      }

      .btn:hover {
        background: rgba(29, 78, 216, 0.16);
      }

      @media (max-width: 760px) {
        .page-shell {
          padding: 22px 16px 28px;
        }

        .hero {
          padding: 30px 24px;
        }
      }
    </style>

    <script>
      window.setTimeout(() => {
        window.location.href = "https://starbooks.ph/partners";
      }, 1800);
    </script>
  </head>
  <body>
    <div class="page-shell">
      <section class="hero">
        <div class="eyebrow">STARBOOKS Collaborators</div>
        <h1>Opening partners page</h1>
        <p>
          You’ll be redirected to the official STARBOOKS partners page in a
          moment. If it doesn’t open automatically, use the button below.
        </p>
      </section>

      <div class="panel" role="status" aria-live="polite">
        <div class="hint">
          Redirecting to <strong>starbooks.ph/partners</strong>…
        </div>
        <a
          class="btn"
          href="https://starbooks.ph/partners"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fa-solid fa-arrow-up-right-from-square"></i>
          Open now
        </a>
      </div>
    </div>
  </body>
</html>
