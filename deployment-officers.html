<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>STARBOOKS Deployment Officers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SwiperJS (Carousel Library) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <style>
      :root {
        color-scheme: light;
        --bg: #f4f8ff;
        --panel: rgba(255, 255, 255, 0.92);
        --text: #16202b;
        --muted: #5f6e7a;
        --border: rgba(22, 32, 43, 0.1);
        --shadow: 0 28px 80px rgba(22, 32, 43, 0.14);
        --accent: #2563eb;
        --accent-2: #60a5fa;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background: radial-gradient(
          circle at top left,
          #e8f2ff 0%,
          #fdfcff 44%,
          #f8f9fb 100%
        );
        color: var(--text);
      }

      header {
        text-align: center;
        padding: 44px 20px 36px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        position: relative;
        overflow: hidden;
      }

      header::after {
        content: "";
        position: absolute;
        width: 360px;
        height: 360px;
        right: -150px;
        top: -170px;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.35),
          transparent 60%
        );
        filter: blur(10px);
      }

      header h1 {
        margin: 0;
        font-size: clamp(2rem, 3.2vw, 3.2rem);
        line-height: 1.06;
        letter-spacing: -0.02em;
        position: relative;
        z-index: 1;
      }

      header p {
        margin: 12px 0 0;
        opacity: 0.92;
        font-size: 1.02rem;
        position: relative;
        z-index: 1;
      }

      .page-shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 26px 20px 38px;
      }

      .year-title {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 14px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.12);
        border: 1px solid rgba(37, 99, 235, 0.18);
        color: #123a97;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .year-section {
        padding: 22px;
        border-radius: 26px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        margin-top: 20px;
      }

      /* Carousel */
      .swiper {
        width: 100%;
        padding-bottom: 40px;
      }

      .swiper-slide {
        text-align: center;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(22, 32, 43, 0.08);
        box-shadow: 0 2px 5px rgba(22, 32, 43, 0.12);
        transform: translateZ(0);
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .swiper-slide:hover {
        transform: translateY(-6px);
        box-shadow: 0 26px 66px rgba(22, 32, 43, 0.16);
      }

      .swiper-slide img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        display: block;
      }

      .caption {
        padding: 12px 14px 14px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #1f2b3a;
        line-height: 1.4;
      }

      .swiper-button-prev,
      .swiper-button-next {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(22, 32, 43, 0.12);
        box-shadow: 0 18px 44px rgba(22, 32, 43, 0.14);
        color: #0f172a;
      }

      .swiper-button-prev::after,
      .swiper-button-next::after {
        font-size: 16px;
        font-weight: 900;
      }

      .swiper-pagination-bullet {
        background: rgba(37, 99, 235, 0.35);
        opacity: 1;
      }

      .swiper-pagination-bullet-active {
        background: rgba(37, 99, 235, 0.95);
      }

      @media (max-width: 760px) {
        header {
          padding: 34px 16px 28px;
        }

        .page-shell {
          padding: 18px 16px 28px;
        }

        .year-section {
          padding: 16px;
        }
      }
    </style>
  </head>

  <body>
    <!-- Header -->
    <header>
      <h1>STARBOOKS Deployment Officers</h1>
      <p>Deployment Activities by Year</p>
    </header>

    <main class="page-shell">
      <!-- YEAR 2024 -->
      <div class="year-section">
        <div class="year-title">📅 2024</div>

        <div class="swiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide">
              <img
                src="https://picsum.photos/400/200?1"
                alt="Deployment in LGU A"
                loading="lazy"
              />
              <div class="caption">Deployment in LGU A</div>
            </div>

            <div class="swiper-slide">
              <img
                src="https://picsum.photos/400/200?2"
                alt="Training session"
                loading="lazy"
              />
              <div class="caption">Training Session</div>
            </div>

            <div class="swiper-slide">
              <img
                src="https://picsum.photos/400/200?3"
                alt="Installation activity"
                loading="lazy"
              />
              <div class="caption">Installation Activity</div>
            </div>
            <div class="swiper-slide">
              <img src="https://picsum.photos/400/200?1" />
              <div class="caption">Deployment in LGU A</div>
            </div>

            <div class="swiper-slide">
              <img src="https://picsum.photos/400/200?2" />
              <div class="caption">Training Session</div>
            </div>

            <div class="swiper-slide">
              <img src="https://picsum.photos/400/200?3" />
              <div class="caption">Installation Activity</div>
            </div>
          </div>

          <div class="swiper-button-prev" aria-label="Previous slide"></div>
          <div class="swiper-button-next" aria-label="Next slide"></div>
          <div class="swiper-pagination" aria-hidden="true"></div>
        </div>
      </div>

      <!-- YEAR 2025 -->
      <div class="year-section">
        <div class="year-title">📅 2025</div>

        <div class="swiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide">
              <img
                src="https://picsum.photos/400/200?4"
                alt="Deployment in school"
                loading="lazy"
              />
              <div class="caption">Deployment in School</div>
            </div>

            <div class="swiper-slide">
              <img
                src="https://picsum.photos/400/200?5"
                alt="Orientation program"
                loading="lazy"
              />
              <div class="caption">Orientation Program</div>
            </div>

            <div class="swiper-slide">
              <img
                src="https://picsum.photos/400/200?6"
                alt="Community engagement"
                loading="lazy"
              />
              <div class="caption">Community Engagement</div>
            </div>
          </div>

          <div class="swiper-button-prev" aria-label="Previous slide"></div>
          <div class="swiper-button-next" aria-label="Next slide"></div>
          <div class="swiper-pagination" aria-hidden="true"></div>
        </div>
      </div>
    </main>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
      const swipers = document.querySelectorAll(".swiper");

      swipers.forEach((swiperEl) => {
        new Swiper(swiperEl, {
          slidesPerView: 1,
          spaceBetween: 10,
          loop: true,
          grabCursor: true,
          pagination: {
            el: swiperEl.querySelector(".swiper-pagination"),
            clickable: true,
          },
          navigation: {
            nextEl: swiperEl.querySelector(".swiper-button-next"),
            prevEl: swiperEl.querySelector(".swiper-button-prev"),
          },

          breakpoints: {
            640: { slidesPerView: 2 },
            1024: { slidesPerView: 3 },
          },
        });
      });
    </script>
  </body>
</html>
